type: news
title: Bun is Back in the Oven
date: 2026-03-09
teaser: >
  It’s a rare non-AI episode! Instead, fresh Bun just dropped 🍞, npmx is the UX we all want for npm, and Solid jumps straight from experimental to beta in v2.
description: >
  This week's non-AI episode this week!

  It’s been a minute since we last discussed Bun, but the team is back with a new release. In v1.3.10, the REPL’s completely rewritten in Zig, barrel imports are optimized, and the JavaScriptCore engine got upgraded for big perf gains.


  Npmx, a fast, modern browser for the npm registry has reached alpha version in less than 2 months of existence. Its goal is to make it easy for devs to find, evaluate, and manage npm packages, and boasts cool features like the ability to compare packages and even launch demo environments directly from package READMEs. Take notes, npm.


  Solid 2.0.0 jumped straight from experimental to beta this week, and it introduces changes like: async is first-class, derived state is a primitive, dev guardrails to prevent foot guns, and a DOM cleanup model.


  In Lightning News, the cloud-hosted DB platform PlanetScale, bought the Drizzle ORM team, and Safari adds support for customizable HTML <select> elements.


  Fire Starters also makes a return this week with the baseline support for the Navigation API. Say goodbye to multiple functions within a SPA to mimic multipage site navigation: the Navigation API provides automatic URL updates, automatic accessibility, and centralized logic, all in one.
