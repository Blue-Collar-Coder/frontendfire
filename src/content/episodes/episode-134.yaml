number: 134
type: news
title: Anthropic is Having a Week
date: 2026-03-02
teaser: >
  Claude gets remote control 👀, Anthropic refuses to hand over AI for unrestricted military use 💥, and Cloudflare ships an AI-built Next.js replacement in a week. 🤯
description: >
  This week’s episode is all about Anthropic. First up, Anthropic unveiled Claude Remote Control, which will let users continue a Claude session back on their personal machine from a phone, tablet via the Claude mobile app. Watch out OpenClaw.


  Anthropic continued making news by refusing to bow to the Department of War’s request for “unrestricted use” of its AI for military purposes, including domestic surveillance and fully-autonomous weapons. We’ll let you know if those defense contracts get revoked or not.


  On a lighter note, a developer at Cloudflare rebuilt Next.js with AI as a drop-in replacement using Vite… in one week. That’s right! $1,100 worth of tokens, access to Next’s docs and test suite, and Claude Code, and Bob’s your uncle! We’d be wary of using this in prod, yet, but what a story!


  And in Lightning News this week: VoidZero’s Rust-based code formatter Oxfmt has reached beta status and is 30x faster than Prettier, popular React component library styled-components has added RSC support, and a hobby coder who wanted to steer his robot vacuum with a PS5 controller reversed engineered his vacuum’s communication protocols, and connected to 7,000 other vacuums around the world. How’s that for security?
