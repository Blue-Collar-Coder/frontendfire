number: 137
type: news
title: Netlify Enters the AI App Builder Race
date: 2026-03-23
teaser: >
  Big moves at Netlify with Netlify Start—build and deploy apps from a prompt in minutes. Vite 8 lands with massive performance gains, and no more guessing—every Node.js release is now LTS 🔥.
description: >
  This week the VoidZero team shipped Vite 8. It’s using Rolldown under the hood and boasting 30x faster builds, full plugin compatibility, integrated devtools, and a searchable registry for all Vite, Rolldown, and Rollup plugins.


  Co-host Jack has officially joined Netlify as a Principal Developer Experience Engineer and announces the launch of Netlify Start. Start a new Netlify project with a prompt on the site, and see it built and deployed in minutes, and keep iterating on it, either in Netlify or on your local machine, your choice.


  The Node.js team is changing their release schedule so that every release now (both even and odd) numbers will be an LTS release, and beginning in 2027, it will be named release 27, just to make it easier for everyone.


  In this week’s Lightning News round, Encyclopedia Brittanica and Merriam-Webster join the many filing lawsuits against OpenAI for training its LLMs on their data without permissions, OpenAI founder Sam Altman dismisses web devs who typed code by hand as quaint and outdated, and hosting companies Vercel and Cloudflare can’t keep it civil on social media as Cloudflare forks another popular code base Vercel maintains.
