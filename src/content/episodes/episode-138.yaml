number: 138
type: news
title: Next.js Leans into AI Agents
date: 2026-03-30
teaser: >
  Next.js doubles down on AI-assisted dev in 16.2 🤖, but admits deploying those apps outside of Vercel isn’t easy  😬. Plus, TypeScript 6.0 sets the stage for a major compiler shift.
description: >
  Microsoft dropped the last version of JavaScript-powered TypeScript this week with TS 6.0. TypeScript 6 bridges the gap between the TS of yesteryear and the soon to come Go-powered TS compiler of TypeScript 7 that users can fix now so they can smoothly upgrade to version 7 later.


  Next.js 16.2 debuted this week with the usual performance improvements expected in a minor version upgrade, plus AI improvements to make AI-assisted development smoother and easier.


  In response to Cloudflare’s Vinext fork a few weeks back, Vercel’s released a stable of adapter APIs to make deploying Next.js apps to hosting platforms besides Vercel easier. While this is a step in the right direction, it’s still not exactly “easy” to get all the bells and whistles of a Next app running on other platforms.


  For the Lightning News section this week: Firefox gets split tab views as well, OpenAI abruptly shuts down its Sora AI video generator site, between Claude Code and Claude Cowork, Claude can now control your whole computer (eat your heart out OpenClaw), and the hosts are finding more uses for Claude Cowork themselves, and see its appeal for non-tech folks who are intimidated by something like Claude Code.
