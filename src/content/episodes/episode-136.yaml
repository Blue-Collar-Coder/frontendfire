number: 136
type: news
title: VoidZero Wants to be the Laravel of JavaScript
date: 2026-03-16
teaser: >
  VoidZero just open-sourced Vite+, a unified JS toolchain vision. The Awesomeverse gets awesomer as Eleventy becomes Build Awesome, and Astro 6.0 lands its first big release since being acquired by Cloudflare.
description: >
  JavaScript framework Eleventy has been renamed Build Awesome, 1.5 years after joining the Font Awesome stable. The name change precedes Build Awesome Pro, which will offer premium features (like Font Awesome Pro) alongside the features Eleventy users know and love. Today the Awesomeverse got a little awesomer.


  The VoidZero team also open-sourced Vite+, which is a unified toolchain and entry point to web app development that manages runtime, package manager, and frontend toolchain all in one. May Evan You and team never slow down.


  Since being acquired by Cloudflare, the Astro team had their first big release with Astro 6.0, which includes a new dev server and build pipeline powered by Vite’s environment API so it can run the exact same production runtime during development. Other upgrades include a built-in Fonts API, request-time content, and a new experimental Rust compiler.


  In Lightning news this week, Mozilla’s giving Firefox a facelift, the Chrome team wants feedback on a new focusgroup HTML attribute, TanStack AI now supports voice chat and multiple LLM providers, OpenClaw’s latest version severely hamstrings the lobster’s default permissions making it a lot less useful (and destructive) than it previously was, and the OpenClaw social network Moltbook just got acquired by Meta. Didn’t see that last one coming, that’s for sure.
